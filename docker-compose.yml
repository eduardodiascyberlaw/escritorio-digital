services:
  # ─────────────────────────────────────────────
  # Paperclip — Orquestração de agentes
  # ─────────────────────────────────────────────
  paperclip:
    image: node:20-alpine
    working_dir: /app/paperclip
    command: sh -c "corepack enable && corepack prepare pnpm@latest --activate && pnpm install --filter paperclip... && pnpm --filter @sd-legal/shared build && pnpm --filter paperclip build && pnpm --filter paperclip start"
    volumes:
      - .:/app
      - paperclip_data:/app/paperclip/data
    ports:
      - "3100:3100"
    environment:
      - DATABASE_URL=postgresql://paperclip:${PAPERCLIP_DB_PASSWORD}@paperclip_db:5432/paperclip
      - NODE_ENV=production
    depends_on:
      paperclip_db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sd-legal

  # ─────────────────────────────────────────────
  # PostgreSQL — Base de dados do Paperclip
  # ─────────────────────────────────────────────
  paperclip_db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=paperclip
      - POSTGRES_PASSWORD=${PAPERCLIP_DB_PASSWORD}
      - POSTGRES_DB=paperclip
    volumes:
      - paperclip_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sd-legal

  # ─────────────────────────────────────────────
  # Sónia — Agente Recepcionista (modo supervisionado)
  # ─────────────────────────────────────────────
  sonia:
    image: node:20-alpine
    working_dir: /app/agents/sonia
    command: sh -c "corepack enable && corepack prepare pnpm@latest --activate && cd /app && pnpm install --filter @sd-legal/sonia... && pnpm --filter @sd-legal/shared build && pnpm --filter @sd-legal/sonia build && pnpm --filter @sd-legal/sonia start"
    volumes:
      - .:/app
      - /root/.config/gcloud:/root/.config/gcloud:ro
    ports:
      - "3101:3101"
    environment:
      - NODE_ENV=production
      - SONIA_PORT=3101
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-514934487167}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION:-europe-west4}
      - GEMINI_MODEL_FLASH=${GEMINI_MODEL_FLASH:-gemini-2.5-flash}
      - OBSIDIAN_VAULT_PATH=/app/obsidian-vault
      - EVOLUTION_API_URL=http://host.docker.internal:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-sd-legal}
      - CONTROL_GROUP_NAME=${CONTROL_GROUP_NAME:-SD Legal}
      - PAPERCLIP_API_URL=http://paperclip:3100
      - CRM_AG_API_URL=${CRM_AG_API_URL:-https://plataforma-crm-juridico.klx2s6.easypanel.host}
      - CRM_AG_EMAIL=${CRM_AG_EMAIL}
      - CRM_AG_PASSWORD=${CRM_AG_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - sd-legal

volumes:
  paperclip_data:
  paperclip_db_data:

networks:
  sd-legal:
    driver: bridge
