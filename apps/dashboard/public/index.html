<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SD Legal — Escritorio Digital</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#05050f;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-top:14px;font-family:'Courier New',monospace;color:#88aacc}
    #user-bar{width:800px;display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:#0a0a1c;border:1px solid #181838;border-radius:6px;margin-bottom:8px}
    #user-bar .title{font-size:9px;color:#3a6a9a;letter-spacing:1px}
    #user-bar .right{display:flex;gap:12px;align-items:center}
    #user-name{font-size:9px;color:#60a5fa}
    .btn-logout{background:#100808;color:#884444;border:1px solid #2a1414;border-radius:3px;font-family:'Courier New',monospace;font-size:8px;padding:3px 8px;cursor:pointer;letter-spacing:1px}
    .btn-logout:hover{background:#1a0c0c}
    #office-wrap{position:relative;width:800px}
    canvas{display:block;border:1.5px solid #2a3a50;border-radius:5px}
    #chatbox{display:none;flex-direction:column;position:absolute;top:10px;right:10px;width:210px;height:280px;background:#0c0c20ee;border:1px solid #2a3a5a;border-radius:6px;overflow:hidden;z-index:10}
    #chat-header{font-size:8px;color:#4a7aaa;letter-spacing:2px;padding:7px 8px;border-bottom:1px solid #1e2e48;text-align:center}
    #chat-msgs{flex:1;overflow-y:auto;padding:6px 8px;font-size:9px;line-height:1.5}
    #chat-msgs::-webkit-scrollbar{width:3px}
    #chat-msgs::-webkit-scrollbar-thumb{background:#2a3a50;border-radius:2px}
    #chat-msgs .msg{margin-bottom:4px;word-wrap:break-word}
    #stats-bar{width:800px;display:flex;gap:18px;padding:6px 12px;margin-top:6px;background:#0a0a1c;border:1px solid #181838;border-radius:4px;font-size:8px;color:#2a4a6a;letter-spacing:1px}
    #stats-bar .stat{display:flex;gap:4px}
    #stats-bar .val{color:#4a7aaa}
    #controls{width:800px;display:flex;gap:8px;align-items:flex-start;margin-top:6px}
    #btn-meeting{background:#0c1428;color:#4a7aaa;border:1px solid #1a2a50;border-radius:4px;font-family:'Courier New',monospace;font-size:9px;letter-spacing:1px;padding:6px 12px;cursor:pointer}
    #btn-meeting:hover{background:#101a30;color:#60a5fa}
    #meeting-panel{display:none;background:#0a0a1c;border:1px solid #1e3a6a;border-radius:6px;padding:10px 14px}
    #meeting-panel label{display:block;font-size:9px;color:#4a7aaa;margin:3px 0;cursor:pointer}
    #meeting-panel label:hover{color:#60a5fa}
    #meeting-panel input[type=checkbox]{margin-right:6px;accent-color:#3b82f6}
    #btn-start-meet{margin-top:8px;background:#0c2040;color:#60a5fa;border:1px solid #1a4a80;border-radius:3px;font-family:'Courier New',monospace;font-size:8px;letter-spacing:1px;padding:5px 10px;cursor:pointer;width:100%}
    #btn-start-meet:hover{background:#142850}
    #status-bar{width:800px;padding:5px 12px;margin-top:6px;background:#0a0a1c;border:1px solid #181838;border-radius:4px;font-size:8px;color:#2a5a3a;letter-spacing:1px;min-height:22px}
    .hud-label{font-size:7px;color:#2a4a6a;margin-right:2px}
  </style>
</head>
<body>
  <div id="user-bar">
    <span class="title">SD LEGAL — ESCRITORIO DIGITAL</span>
    <div class="right">
      <span id="user-name"></span>
      <form method="POST" action="/auth/logout" style="margin:0">
        <button type="submit" class="btn-logout">SAIR</button>
      </form>
    </div>
  </div>

  <div id="office-wrap">
    <canvas id="office" width="800" height="540"></canvas>
    <div id="chatbox">
      <div id="chat-header">SALA DE REUNIAO</div>
      <div id="chat-msgs"></div>
    </div>
  </div>

  <div id="stats-bar">
    <div class="stat"><span class="hud-label">PROC</span><span class="val" id="s-proc">0</span></div>
    <div class="stat"><span class="hud-label">TICK</span><span class="val" id="s-tick">0</span></div>
    <div class="stat"><span class="hud-label">MSG</span><span class="val" id="s-msg">0</span></div>
    <div class="stat"><span class="hud-label">PEC</span><span class="val" id="s-pec">0</span></div>
    <div class="stat"><span class="hud-label">CLI</span><span class="val" id="s-cli">0</span></div>
  </div>

  <div id="controls">
    <button id="btn-meeting">CONVOCAR REUNIAO</button>
    <div id="meeting-panel">
      <label><input type="checkbox" value="sonia" checked> Sonia</label>
      <label><input type="checkbox" value="rex" checked> Rex</label>
      <label><input type="checkbox" value="iris"> Iris</label>
      <label><input type="checkbox" value="lex"> Lex</label>
      <label><input type="checkbox" value="nova"> Nova</label>
      <button id="btn-start-meet">INICIAR REUNIAO</button>
    </div>
  </div>

  <div id="status-bar"><span id="status">A inicializar...</span></div>

<script>
const cv = document.getElementById('office');
const ctx = cv.getContext('2d');
const W = 800, H = 540;

// ── PALETTE — lighter office floor for contrast ──────────────────────────
const PAL = {
  bg:'#1a1a2e',       // office floor — lighter gray-blue
  wall:'#2e3e58',     // wall borders
  wallH:'#3a5a7a',    // wall highlight
  corridor:'#16162a', // corridor slightly darker than floor
  grid:'#1e1e34',     // grid lines
  text:'#3a5a7a',     // labels in rooms
  textH:'#5a8aba',    // bright labels
  desk:'#141428',     // desk surface
  deskBord:'#24243e', // desk border
};

const ACOL = {
  sonia:'#a855f7', rex:'#3b82f6', iris:'#22c55e', lex:'#eab308', nova:'#f97316'
};
const ABODY = {
  sonia:'#7c3aed', rex:'#2563eb', iris:'#16a34a', lex:'#ca8a04', nova:'#ea580c'
};
const ANAMES = {
  sonia:'SONIA', rex:'REX', iris:'IRIS', lex:'LEX', nova:'NOVA'
};

// ── OFFICE LAYOUT (800x540) ──────────────────────────────────────────────
const ROOMS = [
  {id:'meet',  x:5,   y:5,   w:148, h:200, label:'REUNIAO',    col:'#141e38'},
  {id:'server',x:647, y:5,   w:148, h:200, label:'SERVIDOR',   col:'#141828'},
  {id:'crm',   x:5,   y:335, w:148, h:200, label:'CRM',        col:'#142818'},
  {id:'lexc',  x:647, y:335, w:148, h:200, label:'LEX CORPUS', col:'#281e10'},
];

const DESKS = [
  {id:'sonia', x:178, y:35,  w:100, h:100},
  {id:'rex',   x:293, y:35,  w:100, h:100},
  {id:'iris',  x:408, y:35,  w:100, h:100},
  {id:'lex',   x:523, y:35,  w:100, h:100},
  {id:'nova',  x:178, y:380, w:100, h:100},
];

const CORRIDOR_Y = 270;
const CORRIDOR_TOP = 215;
const CORRIDOR_BOT = 325;

const TARGETS = {
  meet:  {x:79,  y:105},
  crm:   {x:79,  y:435},
  lexc:  {x:721, y:435},
  server:{x:721, y:105},
};

const MEET_SEATS = [
  {x:40,y:70},{x:75,y:62},{x:110,y:70},
  {x:40,y:138},{x:75,y:145},{x:110,y:138},
];

// ── AGENTS ───────────────────────────────────────────────────────────────
const AG = {};
['sonia','rex','iris','lex','nova'].forEach(id => {
  const d = DESKS.find(d => d.id === id);
  const hx = d.x + d.w/2, hy = d.y + d.h/2 + 12;
  AG[id] = {
    x:hx, y:hy, hx:hx, hy:hy,
    path:[], busy:false, frame:0,
    state:'idle', task:'',
  };
});

const SPD = 2.0;

// ── PATHFINDING ──────────────────────────────────────────────────────────
function buildPath(from, to) {
  const pts = [];
  if (from.y < CORRIDOR_TOP || from.y > CORRIDOR_BOT) {
    pts.push({x:from.x, y:CORRIDOR_Y});
  }
  if (to.y < CORRIDOR_TOP || to.y > CORRIDOR_BOT) {
    pts.push({x:to.x, y:CORRIDOR_Y});
  }
  pts.push({x:to.x, y:to.y});
  return pts;
}

// ── STATE ────────────────────────────────────────────────────────────────
let mAct = false;
let tick = 0;
let crmDrawerOpen = -1;
let crmDrawerFrame = 0;
let lexcGlow = -1;
let lexcGlowFrame = 0;

// ── DRAW: FLOOR ──────────────────────────────────────────────────────────
function drawFloor() {
  // Office floor
  ctx.fillStyle = PAL.bg;
  ctx.fillRect(0,0,W,H);

  // Corridor band — slightly darker
  ctx.fillStyle = PAL.corridor;
  ctx.fillRect(0, CORRIDOR_TOP, W, CORRIDOR_BOT - CORRIDOR_TOP);

  // Grid
  ctx.strokeStyle = PAL.grid;
  ctx.lineWidth = 0.3;
  for (let x=0; x<W; x+=24) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for (let y=0; y<H; y+=24) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  // Corridor center dashes
  ctx.strokeStyle = '#222240';
  ctx.lineWidth = 0.6;
  ctx.setLineDash([8,10]);
  ctx.beginPath(); ctx.moveTo(0,CORRIDOR_Y); ctx.lineTo(W,CORRIDOR_Y); ctx.stroke();
  ctx.setLineDash([]);
}

// ── DRAW: ROOMS ──────────────────────────────────────────────────────────
function drawRooms() {
  ROOMS.forEach(r => {
    ctx.fillStyle = r.col;
    ctx.fillRect(r.x, r.y, r.w, r.h);
    ctx.strokeStyle = PAL.wall;
    ctx.lineWidth = 2;
    ctx.strokeRect(r.x, r.y, r.w, r.h);

    // Door gap
    if (r.id === 'meet' || r.id === 'server') {
      ctx.fillStyle = PAL.corridor;
      const dx = r.id === 'meet' ? r.x + r.w - 2 : r.x;
      ctx.fillRect(dx, r.y + r.h - 28, 4, 24);
    } else {
      ctx.fillStyle = PAL.corridor;
      const dx = r.id === 'crm' ? r.x + r.w - 2 : r.x;
      ctx.fillRect(dx, r.y, 4, 24);
    }

    // Label
    ctx.fillStyle = PAL.textH;
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(r.label, r.x + r.w/2, r.y + 16);

    drawFurniture(r);
  });
}

// ── DRAW: FURNITURE ──────────────────────────────────────────────────────
function drawFurniture(r) {
  const rx = r.x, ry = r.y;
  switch(r.id) {
    case 'meet': {
      // Table
      ctx.fillStyle = '#1c1c3a';
      roundRect(rx+28, ry+75, 92, 55, 5);
      ctx.fill();
      ctx.strokeStyle = '#2a2a4a';
      ctx.lineWidth = 1;
      roundRect(rx+28, ry+75, 92, 55, 5);
      ctx.stroke();
      // Chairs
      [[40,62],[74,58],[108,62],[40,138],[74,142],[108,138]].forEach(([cx,cy])=>{
        ctx.fillStyle = '#16163a';
        ctx.fillRect(rx+cx-6, ry+cy-5, 12, 10);
        ctx.strokeStyle = '#22224a';
        ctx.strokeRect(rx+cx-6, ry+cy-5, 12, 10);
      });
      break;
    }
    case 'crm': {
      for (let i=0; i<4; i++) {
        const dy = ry + 34 + i*38;
        const openAmt = (crmDrawerOpen === i) ? Math.min(crmDrawerFrame, 14) : 0;
        ctx.fillStyle = '#102810';
        ctx.fillRect(rx+22, dy, 104 + openAmt, 32);
        ctx.strokeStyle = '#1e4a1e';
        ctx.lineWidth = 1;
        ctx.strokeRect(rx+22, dy, 104 + openAmt, 32);
        // Handle
        ctx.fillStyle = '#2e6a2e';
        ctx.fillRect(rx+68, dy+12, 12, 7);
        // Number
        ctx.fillStyle = '#1e4a1e';
        ctx.font = '7px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(String(i+1), rx+36, dy+21);
      }
      break;
    }
    case 'lexc': {
      for (let i=0; i<4; i++) {
        const dy = ry + 34 + i*38;
        ctx.fillStyle = '#1e1808';
        ctx.fillRect(rx+16, dy, 116, 32);
        ctx.strokeStyle = '#3a2e14';
        ctx.lineWidth = 1;
        ctx.strokeRect(rx+16, dy, 116, 32);
        const cols = ['#4a3818','#385018','#18304a','#4a1828','#1e4038','#40381e'];
        for (let j=0; j<6; j++) {
          const glow = (lexcGlow === i*6+j) ? Math.sin(lexcGlowFrame*0.15)*0.5+0.5 : 0;
          ctx.fillStyle = glow > 0.2 ? '#eab308' : cols[j];
          ctx.fillRect(rx+22+j*18, dy+5, 14, 22);
        }
      }
      break;
    }
    case 'server': {
      ctx.fillStyle = '#10102a';
      ctx.fillRect(rx+28, ry+32, 92, 148);
      ctx.strokeStyle = '#22224a';
      ctx.lineWidth = 1;
      ctx.strokeRect(rx+28, ry+32, 92, 148);
      for (let i=0; i<5; i++) {
        const sy = ry + 40 + i*27;
        ctx.fillStyle = '#141430';
        ctx.fillRect(rx+34, sy, 80, 22);
        ctx.strokeStyle = '#1e1e40';
        ctx.strokeRect(rx+34, sy, 80, 22);
        // LEDs
        const on = ((tick + i*13) % 60) < 45;
        ctx.fillStyle = on ? '#22c55e' : '#0a2a0a';
        ctx.fillRect(rx+106, sy+8, 5, 5);
        const on2 = ((tick + i*7 + 30) % 80) < 50;
        ctx.fillStyle = on2 ? '#3b82f6' : '#0a0a2a';
        ctx.fillRect(rx+98, sy+8, 5, 5);
      }
      break;
    }
  }
}

// ── DRAW: DESKS ──────────────────────────────────────────────────────────
function drawDesks() {
  DESKS.forEach(d => {
    ctx.fillStyle = PAL.desk;
    ctx.fillRect(d.x, d.y, d.w, d.h);
    ctx.strokeStyle = PAL.deskBord;
    ctx.lineWidth = 1;
    ctx.strokeRect(d.x, d.y, d.w, d.h);

    // Monitor
    const mx = d.x + d.w/2 - 18, my = d.y + 14;
    ctx.fillStyle = '#0e0e1e';
    ctx.fillRect(mx, my, 36, 26);
    ctx.strokeStyle = ACOL[d.id] + '40';
    ctx.lineWidth = 1;
    ctx.strokeRect(mx, my, 36, 26);

    // Screen glow
    if (AG[d.id] && AG[d.id].state === 'working' && !AG[d.id].busy) {
      ctx.fillStyle = ACOL[d.id] + '18';
      ctx.fillRect(mx+1, my+1, 34, 24);
    }

    // Stand
    ctx.fillStyle = '#0e0e1e';
    ctx.fillRect(d.x + d.w/2 - 4, my+26, 8, 5);

    // Agent label
    ctx.fillStyle = ACOL[d.id] + 'aa';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ANAMES[d.id], d.x + d.w/2, d.y + d.h - 6);

    // Task text
    const a = AG[d.id];
    if (a && a.task && !a.busy) {
      ctx.fillStyle = ACOL[d.id] + '60';
      ctx.font = '7px monospace';
      const txt = a.task.length > 16 ? a.task.slice(0,15)+'...' : a.task;
      ctx.fillText(txt, d.x + d.w/2, d.y + d.h + 12);
    }
  });
}

// ── DRAW: AGENTS ─────────────────────────────────────────────────────────
function drawAgent(id) {
  const a = AG[id];
  const moving = a.path.length > 0;
  const bob = Math.sin(a.frame * (moving ? 0.25 : 0.06)) * (moving ? 2.5 : 1);
  const lean = moving ? Math.sin(a.frame * 0.3) * 1.8 : 0;
  const x = Math.round(a.x + lean);
  const y = Math.round(a.y + bob);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(x, y+11, 7, 3, 0, 0, Math.PI*2);
  ctx.fill();

  // Body
  ctx.fillStyle = ABODY[id];
  roundRect(x-6, y-1, 12, 12, 2);
  ctx.fill();

  // Head
  ctx.fillStyle = ACOL[id];
  ctx.beginPath();
  ctx.arc(x, y-7, 6.5, 0, Math.PI*2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(x-3, y-8, 2, 2);
  ctx.fillRect(x+1, y-8, 2, 2);

  // Pupils
  if (moving && a.path.length > 0) {
    const t = a.path[0];
    const dx = t.x > a.x ? 1 : t.x < a.x ? -1 : 0;
    ctx.fillStyle = '#111';
    ctx.fillRect(x-3+dx, y-8, 1, 1);
    ctx.fillRect(x+1+dx, y-8, 1, 1);
  }

  // Name tag while moving
  if (moving) {
    ctx.fillStyle = ACOL[id] + '90';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ANAMES[id], x, y-17);
  }
}

function drawAgents() {
  const sorted = Object.keys(AG).sort((a,b) => AG[a].y - AG[b].y);
  sorted.forEach(drawAgent);
}

// ── DRAW: HUD ────────────────────────────────────────────────────────────
function drawHUD() {
  const connected = !!window._sseConnected;
  ctx.fillStyle = connected ? '#22c55e' : '#ef4444';
  ctx.beginPath();
  ctx.arc(W-14, 14, 4, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = PAL.textH;
  ctx.font = '7px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(connected ? 'LIVE' : 'OFF', W-22, 16);
}

// ── UPDATE ───────────────────────────────────────────────────────────────
function update() {
  tick++;
  for (const id in AG) {
    const a = AG[id];
    a.frame++;
    if (a.path.length > 0) {
      const t = a.path[0];
      const dx = t.x - a.x, dy = t.y - a.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < SPD) {
        a.x = t.x; a.y = t.y;
        a.path.shift();
      } else {
        a.x += (dx/dist)*SPD;
        a.y += (dy/dist)*SPD;
      }
    }
  }
  if (crmDrawerOpen >= 0) crmDrawerFrame++;
  if (lexcGlow >= 0) lexcGlowFrame++;
}

// ── MAIN LOOP ────────────────────────────────────────────────────────────
function loop() {
  update();
  drawFloor();
  drawRooms();
  drawDesks();
  drawAgents();
  drawHUD();
  requestAnimationFrame(loop);
}

// ── HELPERS ──────────────────────────────────────────────────────────────
function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ── ACTIONS ──────────────────────────────────────────────────────────────
function doVisit(fromId, toId) {
  const from = AG[fromId], to = AG[toId];
  if (!from || !to || from.busy) return;
  from.busy = true;
  const target = {x: to.hx - 18, y: to.hy};
  from.path = buildPath({x:from.x, y:from.y}, target);
  setStatus(`${ANAMES[fromId]} visita ${ANAMES[toId]}`);
  setTimeout(() => {
    from.path = buildPath({x:from.x, y:from.y}, {x:from.hx, y:from.hy});
    setTimeout(() => { from.busy = false; }, 3000);
  }, 4000);
}

function doMeeting(caller, members, isLocal) {
  if (mAct) return;
  mAct = true;
  members.forEach((id,i) => {
    const a = AG[id];
    if (!a) return;
    a.busy = true;
    const seat = MEET_SEATS[i % MEET_SEATS.length];
    const target = {x: ROOMS[0].x + seat.x, y: ROOMS[0].y + seat.y};
    a.path = buildPath({x:a.x, y:a.y}, target);
  });
  document.getElementById('chatbox').style.display = 'flex';
  document.getElementById('chat-msgs').innerHTML = '';
  pushMsg(caller, 'Reuniao convocada.', !Object.keys(ACOL).includes(caller));
  setStatus('REUNIAO: ' + members.map(m=>ANAMES[m]||m.toUpperCase()).join(', '));
}

function endMeet() {
  mAct = false;
  document.getElementById('chatbox').style.display = 'none';
  for (const id in AG) {
    const a = AG[id];
    if (a.busy) {
      a.path = buildPath({x:a.x, y:a.y}, {x:a.hx, y:a.hy});
      setTimeout(((ag) => () => { ag.busy = false; })(a), 3500);
    }
  }
  setStatus('Reuniao terminada.');
}

function doCRM(agentId, drawer) {
  const a = AG[agentId];
  if (!a || a.busy) return;
  a.busy = true;
  a.path = buildPath({x:a.x, y:a.y}, TARGETS.crm);
  setStatus(`${ANAMES[agentId]} acede ao CRM`);
  crmDrawerOpen = typeof drawer === 'number' ? drawer : Math.floor(Math.random()*4);
  crmDrawerFrame = 0;
  setTimeout(() => {
    crmDrawerOpen = -1; crmDrawerFrame = 0;
    a.path = buildPath({x:a.x, y:a.y}, {x:a.hx, y:a.hy});
    setTimeout(() => { a.busy = false; }, 3000);
  }, 5000);
}

function doLexC(agentId) {
  const a = AG[agentId];
  if (!a || a.busy) return;
  a.busy = true;
  a.path = buildPath({x:a.x, y:a.y}, TARGETS.lexc);
  setStatus(`${ANAMES[agentId]} consulta o Lex Corpus`);
  lexcGlow = Math.floor(Math.random()*24);
  lexcGlowFrame = 0;
  setTimeout(() => {
    lexcGlow = -1; lexcGlowFrame = 0;
    a.path = buildPath({x:a.x, y:a.y}, {x:a.hx, y:a.hy});
    setTimeout(() => { a.busy = false; }, 3000);
  }, 5000);
}

function pushMsg(who, msg, isHuman) {
  const el = document.getElementById('chat-msgs');
  const div = document.createElement('div');
  div.className = 'msg';
  const color = ACOL[who] || (isHuman ? '#60a5fa' : '#4a7aaa');
  const name = ANAMES[who] || (who||'SISTEMA').toUpperCase();
  div.innerHTML = '<span style="color:'+color+'">'+name+'</span> '+msg;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function updateHUD(stats) {
  const map = {'s-proc':stats.processos,'s-tick':stats.tickets,'s-msg':stats.msgs,'s-pec':stats.pecas,'s-cli':stats.clientes};
  Object.entries(map).forEach(([id,val])=>{
    const el = document.getElementById(id);
    if (el) el.textContent = String(val ?? 0);
  });
}

// ── MEETING BUTTON ───────────────────────────────────────────────────────
document.getElementById('btn-meeting').onclick = () => {
  const panel = document.getElementById('meeting-panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
};

document.getElementById('btn-start-meet').onclick = () => {
  const checks = document.querySelectorAll('#meeting-panel input[type=checkbox]:checked');
  const members = Array.from(checks).map(c => c.value);
  if (members.length === 0) return;
  document.getElementById('meeting-panel').style.display = 'none';
  const caller = window._currentUser || 'eduardo';
  doMeeting(caller, members, true);
  setTimeout(() => { if (mAct) endMeet(); }, 30000);
};

// ── SSE ──────────────────────────────────────────────────────────────────
window._sseConnected = false;
window._currentUser = '';

fetch('/auth/me')
  .then(r => r.json())
  .then(u => {
    if (u.displayName) {
      document.getElementById('user-name').textContent = u.displayName.toUpperCase();
      window._currentUser = u.username;
    }
  })
  .catch(() => { window.location.href = '/login'; });

const es = new EventSource('/events');

es.onopen = () => {
  window._sseConnected = true;
  setStatus('Ligado ao servidor. A aguardar eventos...');
};

es.onerror = () => {
  window._sseConnected = false;
  setStatus('A reconectar ao servidor...');
};

es.onmessage = (e) => {
  try { handleEvent(JSON.parse(e.data)); }
  catch (err) { console.warn('SSE parse error:', err); }
};

function handleEvent(ev) {
  switch (ev.type) {
    case 'agent_state': {
      const a = AG[ev.agentId];
      if (a) {
        a.state = ev.state || 'idle';
        if (ev.task) a.task = ev.task;
      }
      break;
    }
    case 'agent_visit':
      if (!AG[ev.from]?.busy && !AG[ev.to]?.busy) doVisit(ev.from, ev.to);
      break;
    case 'meeting_start':
      if (!mAct) doMeeting(ev.caller, ev.members, false);
      break;
    case 'meeting_msg':
      if (document.getElementById('chatbox').style.display !== 'none')
        pushMsg(ev.who, ev.msg, ev.isHuman || false);
      break;
    case 'meeting_end':
      endMeet();
      break;
    case 'crm_access':
      if (!AG[ev.agentId]?.busy) doCRM(ev.agentId, ev.drawer);
      break;
    case 'lexc_access':
      if (!AG[ev.agentId]?.busy) doLexC(ev.agentId);
      break;
    case 'ticket_created':
      setStatus('Ticket: '+(ev.from||'').toUpperCase()+' -> '+(ev.to||'').toUpperCase()+' ['+ev.tipo+']');
      if (!AG[ev.from]?.busy && !AG[ev.to]?.busy) doVisit(ev.from, ev.to);
      break;
    case 'stats':
      updateHUD(ev);
      break;
    case 'alert':
      setStatus(ev.msg || '');
      break;
  }
}

// ── BOOT ─────────────────────────────────────────────────────────────────
setTimeout(() => setStatus('SD Legal activo. A aguardar eventos do Paperclip...'), 800);
loop();
</script>
